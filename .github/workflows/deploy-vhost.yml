name: 部署到虚拟主机（FTP）

on:
  push:
    branches: [main]
    paths-ignore:
      - 'supabase/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: 检查部署配置
        shell: bash
        env:
          FTP_HOST: ${{ vars.FTP_HOST }}
          FTP_USER: ${{ vars.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          [[ -n "$FTP_HOST" ]] || { echo "Missing repository variable: FTP_HOST"; exit 1; }
          [[ -n "$FTP_USER" ]] || { echo "Missing repository variable: FTP_USER"; exit 1; }
          [[ -n "$FTP_PASS" ]] || { echo "Missing repository secret: FTP_PASS"; exit 1; }

      - name: 部署到 FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.5
        with:
          server: ${{ vars.FTP_HOST }}
          username: ${{ vars.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./
          server-dir: /wwwroot/
          dangerous-clean-slate: false
          exclude: |
            .git/**
            .github/**
            node_modules/**
            supabase/**
            scripts/**
            docs/**
            README*
            .env
            .env.*
            **/*.ts
            **/*.map
            tsconfig.json
            package*.json
          connection-timeout: 60
          keep-alive: true
