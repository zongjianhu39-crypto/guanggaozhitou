name: 部署 Supabase（Migration + 函数）

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-supabase.yml'
      - 'supabase/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: 检测数据库 migration 变更
        id: migration_changes
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" && -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            base="${{ github.event.before }}"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            base="HEAD^"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "$base" HEAD | grep -q '^supabase/migrations/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 检查 Supabase 部署配置
        shell: bash
        env:
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          [[ -n "$SUPABASE_PROJECT_REF" ]] || { echo "Missing repository variable: SUPABASE_PROJECT_REF"; exit 1; }
          [[ -n "$SUPABASE_ACCESS_TOKEN" ]] || { echo "Missing repository secret: SUPABASE_ACCESS_TOKEN"; exit 1; }
          [[ -n "$SUPABASE_DB_URL" ]] || { echo "Missing repository secret: SUPABASE_DB_URL"; exit 1; }

      - name: 部署数据库 migration
        if: steps.migration_changes.outputs.changed == 'true'
        shell: bash
        run: |
          echo "Pushing database migrations..."
          supabase db push --db-url "$SUPABASE_DB_URL"
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: 部署所有边函数
        shell: bash
        run: |
          for dir in supabase/functions/*/; do
            func_name=$(basename "$dir")
            # 跳过非法函数名（如 _shared）
            if [[ ! $func_name =~ ^[A-Za-z][A-Za-z0-9_-]*$ ]]; then
              echo "Skipping $func_name (not a valid function name)"
              continue
            fi
            # 跳过没有 index.ts 的目录（非函数目录，如 genbi-rules）
            if [[ ! -f "$dir/index.ts" ]]; then
              echo "Skipping $func_name (no index.ts entrypoint)"
              continue
            fi
            echo "Deploying $func_name..."
            supabase functions deploy "$func_name" --project-ref "$SUPABASE_PROJECT_REF"
          done
        env:
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
